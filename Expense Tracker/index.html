<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <!-- External stylesheet -->
  <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="app">

    <!-- Balance Summary Cards -->
    <header>
      <h1>Expense <span>Tracker</span></h1>
      <div class="summary-cards">
        <div class="card balance">
          <p class="card-label">Net Balance</p>
          <h2 id="netBalance">$0.00</h2>
        </div>
        <div class="card income">
          <p class="card-label">↑ Income</p>
          <h2 id="totalIncome">$0.00</h2>
        </div>
        <div class="card expense">
          <p class="card-label">↓ Expense</p>
          <h2 id="totalExpense">$0.00</h2>
        </div>
      </div>
    </header>

    <!-- Add Transaction Form -->
    <section class="form-section">
      <h3>Add Transaction</h3>
      <div class="form-grid">
        <input type="text"   id="descInput"   placeholder="Description (e.g. Salary)" />
        <input type="number" id="amountInput" placeholder="Amount" min="0" step="0.01"/>
        <select id="typeSelect">
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
        <select id="categorySelect">
          <option value="Food">🍕 Food</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Shopping">🛍 Shopping</option>
          <option value="Health">💊 Health</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Salary">💼 Salary</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>
      <button id="addBtn">+ Add Transaction</button>
    </section>

    <!-- Transaction History -->
    <section class="history-section">
      <div class="history-header">
        <h3>Transaction History</h3>
        <button id="clearAllBtn">Clear All</button>
      </div>
      <ul id="transactionList"></ul>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>

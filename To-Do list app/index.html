<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List</title>
  <!-- Link to external stylesheet -->
  <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="app-wrapper">
    <header>
      <h1>TASK<span>LIST</span></h1>
      <p class="subtitle">Get things done, one task at a time.</p>
    </header>

    <!-- Input section for adding new tasks -->
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task..." maxlength="100" />
      <button id="addBtn">+ Add</button>
    </div>

    <!-- Filter buttons -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <!-- Task list container -->
    <ul id="taskList"></ul>

    <!-- Footer stats -->
    <div class="footer">
      <span id="taskCount">0 tasks left</span>
      <button id="clearBtn">Clear Completed</button>
    </div>
  </div>

  <!-- Link to external JavaScript -->
  <script src="script.js"></script>
</body>
</html>
